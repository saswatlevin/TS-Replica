name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [23.5.0]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js v${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # --- Use this block if your project is plain JavaScript ---
      - name: Syntax check all JS files
        run: |
          find . -name "*.js" \
            -not -path "./node_modules/*" \
            -print0 | xargs -0 -n1 node --check

      # --- Use this block instead if your project is TypeScript ---
      # - name: TypeScript compile check
      #   run: npx tsc --noEmit